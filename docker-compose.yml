services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "5001:5001"
    environment:
      # Keep the SQLite file on a named volume so data survives container restarts.
      - DATABASE_PATH=/data/lolsuit.db
      - JWT_SECRET=change-me-in-production
    volumes:
      - server-data:/data

volumes:
  server-data:
